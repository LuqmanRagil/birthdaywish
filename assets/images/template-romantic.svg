    <path d="M150 210 C 140 192, 110 192, 110 216 C 110 240, 150 264, 150 264 C 150 264, 190 240, 190 216 C 190 192, 160 192, 150 210 Z"/>
    <path d="M255 195 C 248 182, 228 182, 228 199 C 228 216, 255 233, 255 233 C 255 233, 282 216, 282 199 C 282 182, 262 182, 255 195 Z"/>
  </g>

  <!-- sulur bunga sederhana -->
  <g stroke="#E7C97A" stroke-width="1.3" fill="none" opacity="0.6">
    <path d="M80 120 Q 100 90 130 100 Q 150 108 140 130"/>
    <circle cx="130" cy="98" r="5" fill="none"/>
    <path d="M320 130 Q 300 100 270 112 Q 250 120 262 142"/>
