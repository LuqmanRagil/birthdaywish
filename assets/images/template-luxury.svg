<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="luxBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1508"/>
      <stop offset="55%" stop-color="#4a3a12"/>
      <stop offset="100%" stop-color="#C9A24B"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#luxBg)"/>

  <!-- bingkai ornamen sudut -->
  <g stroke="#E7C97A" stroke-width="1.4" fill="none" opacity="0.75">
    <path d="M40 40 H90 M40 40 V90"/>
    <path d="M360 40 H310 M360 40 V90"/>
    <path d="M40 460 H90 M40 460 V410"/>
    <path d="M360 460 H310 M360 460 V410"/>
  </g>

  <!-- mahkota sederhana -->
  <g transform="translate(200,240)">
    <path d="M-60 30 L-60 -10 L-30 15 L0 -30 L30 15 L60 -10 L60 30 Z"
