  </g>

  <path d="M250 430 C 60 300 30 180 120 110 C 180 65 240 90 250 150 C 260 90 320 65 380 110 C 470 180 440 300 250 430 Z"
        fill="none" stroke="#E7C97A" stroke-width="4"/>

  <g fill="#F7F1E6" opacity="0.8">
