  <text x="200" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#3A1D42">Birthday Anime Style</text>
  <text x="200" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="12" letter-spacing="2" fill="#5b3a52">CERIA &amp; PENUH WARNA</text>
