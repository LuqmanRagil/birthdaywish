  <text x="200" y="60" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#F7F1E6" opacity="0.9">Birthday Romantic</text>
  <text x="200" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="12" letter-spacing="2" fill="#E7C97A" opacity="0.8">UNTUK PASANGAN TERCINTA</text>
</svg>
