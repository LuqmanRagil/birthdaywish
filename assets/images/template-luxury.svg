    <circle cx="-60" cy="-14" r="5" fill="#E7C97A"/>
    <circle cx="0" cy="-34" r="6" fill="#E7C97A"/>
    <circle cx="60" cy="-14" r="5" fill="#E7C97A"/>
    <line x1="-60" y1="30" x2="60" y2="30" stroke="#E7C97A" stroke-width="2"/>
  </g>

  <!-- kilau kecil -->
  <g fill="#F7F1E6" opacity="0.8">
    <circle cx="110" cy="150" r="2.5"/>
    <circle cx="300" cy="170" r="2"/>
    <circle cx="140" cy="360" r="2"/>
    <circle cx="270" cy="340" r="2.5"/>
  </g>

  <text x="200" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#F7F1E6">Birthday Luxury</text>
  <text x="200" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="12" letter-spacing="3" fill="#E7C97A">MEWAH &amp; BERKELAS</text>
</svg>
