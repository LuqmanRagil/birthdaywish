      <stop offset="0%" stop-color="#7a2e42"/>
      <stop offset="100%" stop-color="#2B1330"/>
    </linearGradient>
    <radialGradient id="romGlow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#E8A7B3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E8A7B3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#romBg)"/>
  <rect width="400" height="500" fill="url(#romGlow)"/>

  <!-- garis dekoratif melengkung -->
  <path d="M40 460 C 120 420, 280 420, 360 460" stroke="#E7C97A" stroke-width="1.5" fill="none" opacity="0.5"/>

