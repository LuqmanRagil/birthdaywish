    <rect x="-55" y="-35" width="110" height="14" rx="7" fill="#F7F1E6"/>
    <!-- lilin -->
    <rect x="-6" y="-70" width="12" height="30" rx="3" fill="#E7C97A"/>
    <path d="M0 -85 Q 8 -75 0 -66 Q -8 -75 0 -85 Z" fill="#ff7a90"/>
    <!-- wajah kawaii di badan kue -->
